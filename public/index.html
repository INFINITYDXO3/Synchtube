<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sync</title>
  <style>
    body { background:#111; color:#fff; font-family:system-ui; text-align:center; padding:20px; }
    #controls { margin:15px auto; max-width:600px; display:flex; gap:10px; }
    input { flex:1; padding:10px; border-radius:6px; border:1px solid #333; background:#222; color:#fff; }
    button { padding:10px 20px; border:none; border-radius:6px; background:#e62117; color:#fff; cursor:pointer; }
    #player { width:100%; max-width:800px; aspect-ratio:16/9; margin:20px auto; background:#000; border-radius:8px; overflow:hidden; }
  </style>
</head>
<body>
  <h2>SyncTube</h2>
  <div id="controls">
    <input id="url" placeholder="Paste YouTube URL" autocomplete="off">
    <button id="load">Load</button>
  </div>
  <div id="player"></div>
  <p id="status" style="color:#888; font-size:13px;">Connecting...</p>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let player, ready = false, syncing = false;
    let pending = null;

    window.onYouTubeIframeAPIReady = () => {
      player = new YT.Player('player', {
        height:'100%', width:'100%', videoId:'',
        playerVars:{ controls:1, fs:1, playsinline:1, origin:location.origin },
        events:{ onReady:()=>{ ready=true; document.getElementById('status').textContent='Ready.'; if(pending) apply(pending); pending=null; },
                 onStateChange:e=>{ if(syncing) return;
                   if(e.data===YT.PlayerState.PLAYING||e.data===YT.PlayerState.PAUSED)
                     socket.emit('playerState',{ currentTime:player.getCurrentTime(), isPlaying:e.data===YT.PlayerState.PLAYING });
                 } }
      });
    };

    function apply(d) {
      syncing = true;
      if(d.videoId && d.videoId !== player.getVideoData()?.video_id)
        player.loadVideoById({ videoId:d.videoId, startSeconds:d.currentTime||0 });
      else if(d.videoId) player.seekTo(d.currentTime, true);
      d.isPlaying ? player.playVideo() : player.pauseVideo();
      setTimeout(()=>syncing=false, 400);
    }

    socket.on('sync', d => ready ? apply(d) : pending=d);

    document.getElementById('load').onclick = () => {
      const u = document.getElementById('url').value.trim();
      if(u) socket.emit('load', u);
      document.getElementById('url').value = '';
    };

    // Load YouTube API
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  </script>
</body>
</html>
